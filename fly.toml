app = "navalny-media-bot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  POLL_INTERVAL = "900"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "bot_data"
  destination = "/data"
